<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Password Reset - Smart College</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="auth-wrapper">
        <div class="auth-card border-top border-5 border-danger">
            
            <div class="auth-header">
                <h2>Admin Password Reset</h2>
                <p>Enter your Email address to reset your admin password</p>
            </div>

            <!-- Alert Container for displaying errors -->
            <div id="alert-container"></div>

            <form action="admin_reset_process.php" method="POST">
                
                <div class="mb-3">
                    <label for="email" class="form-label text-muted fw-semibold">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your registered email" required>
                </div>

                <div class="mb-3">
                    <label for="new_password" class="form-label text-muted fw-semibold">New Password</label>
                    <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Enter new password" required>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label text-muted fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
                </div>

                <button type="submit" class="btn btn-danger w-100 mb-3">Reset Password</button>

                <div class="text-center mt-2">
                    <span class="small text-muted">Remember your password? <a href="admin_login.html" class="text-link text-danger">Login here</a></span>
                </div>

            </form>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script to handle URL parameters for alerts -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            
            if (error) {
                const alertContainer = document.getElementById('alert-container');
                alertContainer.innerHTML = `<div class="alert alert-danger alert-custom alert-dismissible fade show" role="alert">
                    ${decodeURIComponent(error)}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>`;
                
                // Clean up the URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });
    </script>
</body>
</html>
