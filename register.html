<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Smart College</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-card { border-top: 5px solid #4a90e2; }
    </style>
</head>
<body class="bg-light">

    <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Register as a new student (Pre-approved IDs only)</p>
            </div>

            <!-- Alert Container for displaying errors -->
            <div id="alert-container"></div>

            <form action="register_process.php" method="POST">
                
                <input type="hidden" name="role" value="Student">

                <div class="mb-3">
                    <label for="name" class="form-label text-muted fw-semibold">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="mb-3">
                    <label for="user_id" class="form-label text-muted fw-semibold">Student ID</label>
                    <input type="text" class="form-control" id="user_id" name="user_id" placeholder="E.g., STD1001" required>
                </div>

                <div class="mb-3">
                    <label for="security_question" class="form-label text-muted fw-semibold">Security Question</label>
                    <select class="form-select" id="security_question" name="security_question" required>
                        <option value="" disabled selected>Select a security question</option>
                        <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                        <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                        <option value="What city were you born in?">What city were you born in?</option>
                        <option value="What is your favorite book?">What is your favorite book?</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="security_answer" class="form-label text-muted fw-semibold">Security Answer</label>
                    <input type="text" class="form-control" id="security_answer" name="security_answer" placeholder="Your answer (will be case-insensitive)" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label text-muted fw-semibold">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
                </div>
                
                <div class="mb-4">
                    <label for="confirm_password" class="form-label text-muted fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>

                <div class="text-center mt-2">
                    <span class="small text-muted">Already have an account? <a href="index.html" class="text-link">Login here</a></span>
                </div>

            </form>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if (error) {
                const alertContainer = document.getElementById('alert-container');
                alertContainer.innerHTML = `<div class="alert alert-danger alert-custom alert-dismissible fade show" role="alert">
                    ${decodeURIComponent(error)}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>`;
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });
    </script>
</body>
</html>
